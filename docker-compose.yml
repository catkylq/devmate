services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  devmate-mcp-search:
    build: .
    command: ["uv", "run", "devmate-mcp-search"]
    depends_on:
      - qdrant
    ports:
      - "3000:3000"
    volumes:
      - ./config.toml:/app/config.toml:ro
    # MCP server uses config.toml, which already points to Tavily.
    # No extra environment variables are required for core functionality.

  devmate-api:
    build: .
    command: ["uv", "run", "devmate-api"]
    depends_on:
      - qdrant
      - devmate-mcp-search
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./config.toml:/app/config.toml:ro
      - ./.skills:/app/.skills

volumes:
  qdrant_storage:

