services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: devmate-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:6333/readyz || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  devmate-mcp-search:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devmate-mcp-search
    command: ["python", "-m", "devmate.mcp_server"]
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./config.toml:/app/config.toml:ro
    restart: unless-stopped

  devmate-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devmate-api
    command: ["python", "-m", "devmate.api"]
    depends_on:
      qdrant:
        condition: service_healthy
      devmate-mcp-search:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - ./config.toml:/app/config.toml:ro
      - ./.skills:/app/.skills
      - ./examples:/app/examples
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local

networks:
  default:
    name: devmate-network
